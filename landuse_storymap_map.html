
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Land Use Change Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f8f8f8; }
        .dashboard-title { text-align: center; margin: 24px 0 12px 0; font-size: 2em; }
        .map-section { margin: 24px auto; max-width: 1200px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 16px; }
        .map-title { font-size: 1.2em; margin-bottom: 8px; }
        .responsive-iframe { width: 100%; height: 420px; border: none; border-radius: 4px; }
        @media (max-width: 700px) {
.responsive-iframe { height: 320px; }
        }
    </style>
</head>
<body>
    <div class="dashboard-title">Land Use Change Dashboard: Sagalla & Marungu</div>
    <div class="map-section">
        <div class="map-title">Sentinel-2 2023 Composite</div>
        <iframe class="responsive-iframe" src="map_2023.html"></iframe>
    </div>
    <div class="map-section">
        <div class="map-title">Classified Land Cover 2018 & 2023</div>
        <iframe class="responsive-iframe" src="map_classified.html"></iframe>
    </div>
    <div class="map-section">
        <div class="map-title">Swipe Map: 2018 vs 2023</div>
        <iframe class="responsive-iframe" src="map_swipe.html"></iframe>
    </div>
</body>
</html>
